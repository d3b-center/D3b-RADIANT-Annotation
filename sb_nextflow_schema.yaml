app_content:
    entrypoint: main.nf
class: nextflow
executor_version: 23.04.1
cwlVersion: None
label: D3b RADIANT Annotation
id: d3b-radiant-annotation
requirements:
-   class: InlineJavascriptRequirement
-   class: ShellCommandRequirement
-   class: InitialWorkDirRequirement
    listing:
    - entryname: input_params.json
      entry: |
          $(JSON.stringify(
          {
          multiallelics: inputs.multiallelics ? inputs.multiallelics : "-any",
          bcftools_strip_extra_args: inputs.bcftools_strip_extra_args ? inputs.bcftools_strip_extra_args : "",
          disable_bcftools_strip_anno: inputs.disable_bcftools_strip_anno ? inputs.disable_bcftools_strip_anno : false,
          disable_bcftools_norm: inputs.disable_bcftools_norm ? inputs.disable_bcftools_norm : false,
          disable_vep: inputs.disable_vep ? inputs.disable_vep : false,
          disable_echtvar_anno: inputs.disable_echtvar_anno ? inputs.disable_echtvar_anno : false,
          disable_slivar_compound_hets: inputs.disable_slivar_compound_hets ? inputs.disable_slivar_compound_hets : true,
          sbg_run: true
          }
          ))

doc: |
    # D3b RADIANT Annotation

    <p align="center">
    <img src="docs/logo/d3b-inline-white.svg" alt="D3b repository logo" width="660px" />
    </p>
    <p align="center">
    <a href="https://github.com/d3b-center/D3b-RADIANT-Annotation/blob/master/LICENSE"><img src="https://img.shields.io/github/license/d3b-center/D3b-RADIANT-Annotation.svg?style=for-the-badge"></a>
    </p>

    Workflow to add various transcript and site level annotations to a DNA germline VCF. The workflow has the following framework:
    - Old annotations are stripped with bcftools
    - VCF is annotated with bcftools
    - VCF is normalized
    - VCF is annotated with VEP
    - VCF is annotated with Echtvar
    - Slivar Compound Hets is run
    - Exomiser is run

    ### Disabling Tools
    Any of the tools can be enabled/disabled using the following disable_(insert_step) parameters. The default workflow runs in the following configuration:
    - disable_bcftools_strip_anno = false
    - disable_bcftools_norm = false
    - disable_vep = false
    - disable_echtvar_anno = false
    - disable_slivar_compound_hets = true
    - disable_exomiser = true

    While any step can be disabled, it might have adverse affects on downstream tools. For example, if you disable VEP but turn on Slivar compound hets, the program can fail if your input VCF does not have any ANN or CSQ INFO fields.
    Validation safeguards only exist for each step because we want to allow for scenarios where partially annotated VCFs can enter at any stage. This allows for faster reannotation in the future.

    ## Inputs

    ### Required - Need to provide
    As mentioned above requirements depend on what is enabled. At the minimum, three inputs are required.
    - `vcf`: KF VCF to process
    - `vcf_index` = Index of `vcf`
    - `output_basename`: String prefix of file outputs. Technically optional, but strongly recommended. Default is `TEST`

    #### BCFTOOLS STRIP ENABLED
    If you enable BCFTOOLS STRIP, at least one of the following must be provided:
    - `rm_fields_csv`
    - `annotate_vcf`
    - `bcftools_strip_extra_args`

    #### BCFTOOLS NORM ENABLED
    If you enable BCFTOOLS NORM, all of the following must be provided:
    - `fasta`

    #### VEP ENABLED
    If you enable VEP, all of the following must be provided:
    - `assembly`
    - `fasta`
    - `vep_cache`
    - `vep_cache_version`
    - `vep_species`

    #### ECHTVAR ENABLED
    If you enable ECHTVAR, all of the following must be provided:
    - `echtvar_zips`

    #### SLIVAR ENABLED
    If you enable SLIVAR, all of the following must be provided:
    - `ped`

    As mentioned above, Slivar does require some annotations. For more information see [our notes](./docs/slivar_compound_hets_notes.md).

    #### EXOMISER ENABLED
    - `analysis_file`: YAML with analysis options. See https://exomiser.readthedocs.io/en/latest/advanced_analysis.html#analysis. Recommend `default_exomiser_WGS_analysis.yml`
    - `datadir_file`: TAR GZ with referenece files. Example contents:
        ```
        data/
        data/remm/
        data/remm/ReMM.v0.4.hg38.tsv.gz.tbi
        data/remm/ReMM.v0.4.hg38.tsv.gz
        data/2406_hg38.sha256
        data/2406_hg38/
        data/2406_hg38/2406_hg38_transcripts_refseq.ser
        data/2406_hg38/2406_hg38_transcripts_ensembl.ser
        data/2406_hg38/2406_hg38_genome.mv.db
        data/2406_hg38/2406_hg38_variants.mv.db
        data/2406_hg38/2406_hg38_transcripts_ucsc.ser
        data/2406_hg38/2406_hg38_clinvar.mv.db
        data/cadd/
        data/cadd/1.7/
        data/cadd/1.7/whole_genome_SNVs.tsv.gz
        data/cadd/1.7/whole_genome_SNVs.tsv.gz.tbi
        data/cadd/1.7/gnomad.genomes.r4.0.indel.tsv.gz
        data/cadd/1.7/gnomad.genomes.r4.0.indel.tsv.gz.tbi
        data/2406_phenotype/
        data/2406_phenotype/2406_phenotype.mv.db
        data/2406_phenotype/rw_string_10.mv
        data/2406_phenotype/phenix/
        data/2406_phenotype/phenix/out/
        data/2406_phenotype/phenix/out/10.out
        data/2406_phenotype/phenix/out/9_symmetric.out
        data/2406_phenotype/phenix/out/14.out
        data/2406_phenotype/phenix/out/13_symmetric.out
        data/2406_phenotype/phenix/out/20.out
        data/2406_phenotype/phenix/out/19.out
        data/2406_phenotype/phenix/out/16_symmetric.out
        data/2406_phenotype/phenix/out/7.out
        data/2406_phenotype/phenix/out/3_symmetric.out
        data/2406_phenotype/phenix/out/8.out
        data/2406_phenotype/phenix/out/17_symmetric.out
        data/2406_phenotype/phenix/out/15_symmetric.out
        data/2406_phenotype/phenix/out/5_symmetric.out
        data/2406_phenotype/phenix/out/11.out
        data/2406_phenotype/phenix/out/14_symmetric.out
        data/2406_phenotype/phenix/out/8_symmetric.out
        data/2406_phenotype/phenix/out/10_symmetric.out
        data/2406_phenotype/phenix/out/1.out
        data/2406_phenotype/phenix/out/20_symmetric.out
        data/2406_phenotype/phenix/out/11_symmetric.out
        data/2406_phenotype/phenix/out/18_symmetric.out
        data/2406_phenotype/phenix/out/4.out
        data/2406_phenotype/phenix/out/19_symmetric.out
        data/2406_phenotype/phenix/out/2.out
        data/2406_phenotype/phenix/out/12.out
        data/2406_phenotype/phenix/out/15.out
        data/2406_phenotype/phenix/out/2_symmetric.out
        data/2406_phenotype/phenix/out/9.out
        data/2406_phenotype/phenix/out/17.out
        data/2406_phenotype/phenix/out/16.out
        data/2406_phenotype/phenix/out/6_symmetric.out
        data/2406_phenotype/phenix/out/13.out
        data/2406_phenotype/phenix/out/18.out
        data/2406_phenotype/phenix/out/3.out
        data/2406_phenotype/phenix/out/4_symmetric.out
        data/2406_phenotype/phenix/out/1_symmetric.out
        data/2406_phenotype/phenix/out/7_symmetric.out
        data/2406_phenotype/phenix/out/6.out
        data/2406_phenotype/phenix/out/5.out
        data/2406_phenotype/phenix/out/12_symmetric.out
        data/2406_phenotype/phenix/hp.obo
        data/2406_phenotype/phenix/ALL_SOURCES_ALL_FREQUENCIES_genes_to_phenotype.txt
        data/2406_phenotype/hp.obo
        ```
    - `pheno_file`: YAML file with sample information
        - Individual example:
        ```yaml
            ---
            id: FM_ZCF17CPC
            proband:
            subject:
                id: BS_4JPDCXVR
                sex: MALE
            phenotypicFeatures:
                - type:
                    id: HP:0009733
                    label: Glioma
            pedigree:
            persons:
                - individualId: BS_4JPDCXVR
                sex: MALE
                affectedStatus: AFFECTED

            metaData:
            resources:
                - id: hp
                name: human phenotype ontology
                url: http://purl.obolibrary.org/obo/hp.owl
                version: hp/releases/2019-11-08
                namespacePrefix: HP
                iriPrefix: 'http://purl.obolibrary.org/obo/HP_'
            phenopacketSchemaVersion: 2.0
        ```
        - Family example:
        ```yaml
            ---
            id: FM_ASMHHE2N
            proband:
            subject:
                id: BS_KPAR4N94
                sex: MALE
            phenotypicFeatures:
                - type:
                    id: HP:0009733
            pedigree:
            persons:
                - individualId: BS_KPAR4N94
                sex: MALE
                paternalId: BS_264QQD38
                maternalId: BS_EQ98CJJT
                affectedStatus: AFFECTED
                - individualId: BS_264QQD38
                sex: MALE
                affectedStatus: UNAFFECTED
                - individualId: BS_EQ98CJJT
                sex: FEMALE
                affectedStatus: UNAFFECTED
            metaData:
            resources:
                - id: hp
                name: human phenotype ontology
                url: http://purl.obolibrary.org/obo/hp.owl
                version: hp/releases/2019-11-08
                namespacePrefix: HP
                iriPrefix: 'http://purl.obolibrary.org/obo/HP_'
            phenopacketSchemaVersion: 2.0

        ```

    ### Input Defaults and Run Configurations

    All of the defaults can be found in params block of `nextflow.config`.
    Kids First specific run configurations can be found in `conf/kids_first.config`.

    #### Kids First Run Configuration
    Here's a snapshot of the run configuration for Kids First Germline data:
    - `bcftools strip` uses the `annotate` module to:
    - remove existing VEP (`CSQ`) and gnomad 3.1.1 (`gnomad_3_1_1*`) annotations
    - add annotations from `annotate_vcf`
    - `bcftools norm`: Uses `norm` to split (or join) mulit-allelics and normalize indels
    - `VEP` uses cache 105 and meets the following specific criteria:
    ```
    --af_1kg
    --af_esp
    --af_gnomad
    --allele_number
    --allow_non_variant
    --appris
    --assembly GRCh38
    --buffer_size 100000
    --cache
    --cache_version 105
    --canonical
    --ccds
    --check_existing
    --compress_output bgzip
    --dir_cache ./
    --domains
    --dont_skip
    --failed 1
    --fasta Homo_sapiens_assembly38.fasta
    --flag_pick
    --format vcf
    --gene_phenotype
    --hgvs
    --hgvsg
    --mane
    --merged
    --no_escape
    --no_stats
    --numbers
    --offline
    --pick_order rank,biotype,mane,canonical,appris,tsl,ccds,length,ensembl,refseq
    --polyphen b
    --protein
    --pubmed
    --regulatory
    --shift_hgvs 1
    --sift b
    --species homo_sapiens
    --symbol
    --total_length
    --tsl
    --uniprot
    --variant_class
    --vcf
    --xref_refseq
    ```
    - `echtvar`: Used for fast gnomAD annotation from the `echtvar_zips` input (gnomad.v3.1.1.custom.echtvar.zip)
    - `slivar`: Used for rare variant discovery, primarily in joint family VCFs using the `expr` with the `slivar_zips` input (topmed.hg38.dbsnp.151.zip)  and `compount-hets` modules
    - `exomiser`: "The Exomiser is a Java program that finds potential disease-causing variants from whole-exome or whole-genome sequencing data." See https://github.com/exomiser/Exomiser for more details

hints:
-   class: sbg:NextflowExecutionMode
    value: multi-instance
-   class: "sbg:maxNumberOfParallelInstances"
    value: 3
arguments:
-   position: 0
    shellQuote: false
    valueFrom: >
        -params-file input_params.json --outdir ./results
inputs:
-   id: vcf
    inputBinding:
        prefix: --vcf
    type:
    - File
    doc: Input VCF file to process
-   id: vcf_index
    inputBinding:
        prefix: --vcf_index
    type:
    - File
    doc: Index of the input VCF file.
-   id: output_basename
    inputBinding:
        prefix: --output_basename
    type:
    - string
    doc: String prefix of file outputs.
-   id: disable_bcftools_strip_anno
    type:
    - 'null'
    - boolean
    doc: "Set to true to skip BCFTOOLS strip/anno step and keep all existing annotations in VCF. NF default is false"
-   id: bcftools_strip_rm_fields_csv
    inputBinding:
        prefix: --rm_fields_csv
    type:
    - 'null'
    - string
    doc: |
        Comma-separated list of fields to remove from the VCF. Default is to remove all existing VEP and gnomad 3.1.1 annotations.
        If you want to keep all existing annotations, set `--disable_bcftools_strip_anno` to true.
        NF Default is INFO/CSQ and INFO/gnomad_3_1_1_* enumerated
-   id: bcftools_strip_extra_args
    type: 'string[]?'
    doc: Extra arguments to pass to bcftools strip command
-   id: bcftools_anno_vcf
    inputBinding:
        prefix: --annotate_vcf
    type:
    - 'null'
    - File
    doc: Optional. VCF file to use to add annotations using bcftools. If provided, the VCF will be annotated with the fields specified in `bcftools_annotate_fields_csv`. If not provided, no additional annotations will be added.
-   id: bcftools_anno_vcf_index
    inputBinding:
        prefix: --annotate_vcf_index
    type:
    - 'null'
    - File
-   id: bcftools_anno_fields_csv
    inputBinding:
        prefix: --annot_fields_csv
    type:
    - 'null'
    - string
    doc: Optional. Comma-separated list of fields to use from `bcftools_annotate_vcf` and/or list of fields to rename.
-   id: disable_bcftools_norm
    type:
    - 'null'
    - boolean
    doc: "Set to true to skip BCFTOOLS norm step if normalization has already ben performed or is not needed. NF default is false. Set to true previously annotated KF VCFs"
-   id: bcftools_norm_check_ref
    inputBinding:
        prefix: --check_ref
    type:
    - 'null'
    - name: check_ref
      type: enum
      symbols:
       - e
       - w
       - x
       - s
    doc: For BCFTOOLS norm. Check REF alleles and exit (e), warn (w), exclude (x), or set (s) bad sites. NF default is `w`.
-   id: bcftools_norm_multiallelics
    type:
    - 'null'
    - string
    doc: "Split multiallelics (-) or join biallelics (+), type: snps|indels|both|any. NF default is `-any`"
-   id: disable_vep
    type:
    - 'null'
    - boolean
    doc: "Set to true to skip VEP step if VEP annotation has already been performed or is not needed. NF default is false"
-   id: vep_cache
    inputBinding:
        prefix: --vep_cache
    type:
    - File
    doc: VEP cache. Current standard is homo_sapiens_vep_111_GRCh38.tar.gz
    sbg:suggestedValue: { class: File, path: 6332f8e47535110eb79c794f, name: homo_sapiens_merged_vep_105_indexed_GRCh38.tar.gz}
-   id: vep_assembly
    inputBinding:
        prefix: --assembly
    type:
    - 'null'
    - string
    doc: Assembly to use for VEP annotation. Default is `GRCh38`. If you have a different assembly, you can specify it here.
-   id: vep_cache_version
    inputBinding:
        prefix: --vep_cache_version
    type:
    - 'null'
    - int
    doc: VEP cache version to use for annotation. Default is `105`. If you have a different cache version, you can specify it here.
-   id: vep_species
    inputBinding:
        prefix: --vep_species
    type:
    - 'null'
    - string
    doc: Species value for VEP
-   id: vep_buffer_size
    inputBinding:
        prefix: --vep_buffer_size
    type:
    - 'null'
    - int
    doc: VEP buffer size. Adjust for memory usage as needed. NF default is 100000
-   id: vep_cpu
    inputBinding:
        prefix: --vep_cpu
    type:
    - 'null'
    - int
    doc: Number of CPUs to allocate for VEP. Default is `32`. This is the max for this implementation, but you can specify fewer if needed.
-   id: disable_echtvar_anno
    type:
    - 'null'
    - boolean
    doc: "Set to true to skip site-based annotation with echtvar. NF default is false"
-   id: ectvar_gnomad_zip
    inputBinding:
        prefix: --echtvar_zips
    type:
    - 'null'
    - File[]
    doc: Echtvar-formated ZIP file containing gnomAD annotation information.
    sbg:suggestedValue: { class: File, path: 65c64d847dab7758206248c6, name: gnomad.v3.1.1.custom.echtvar.zip}
-   id: disable_slivar_compound_hets
    type:
    - 'null'
    - boolean
    doc: "Set to true to skip Slivar compound-hets analysis. Compound hets requires the following INFO field annoations: gnomad_3_1_1_AF_popmax, gnomad_3_1_1_nhomalt, topmed_af, and one of ANN, CSQ, or BCSQ. Experimental: disabled by default."
-   id: slivar_compound_hets_ped
    inputBinding:
        prefix: --ped
    type:
    - 'null'
    - File
    doc: Pedigree file detailing family relationships of individuals in VCF. Necessary for performing Compound Hets analysis.
-   id: slivar_compound_hets_anno_zips
    inputBinding:
        prefix: --slivar_zips
    type:
    - 'null'
    - File[]
    doc: Slivar-formated ZIP files containing additional annotations for performing Compound Hets analysis.
-   id: disable_exomiser
    type:
    - 'null'
    - boolean
    doc: "Set to true to skip EXOMISER step if EXOMISER annotation has already been performed or is not needed. Disabled by default."
-   id: exomiser_analysis_file
    inputBinding:
        prefix: --analysis_file
    type:
    - 'null'
    - File
    doc: YAML with analysis options. See https://exomiser.readthedocs.io/en/latest/advanced_analysis.html#analysis. Recommend `default_exomiser_WGS_analysis.yml`
    sbg:suggestedValue: { class: File, path: 69a1b6ed55b9050ca7142b6e, name: default_exomiser_WGS_analysis.yml }
-   id: exomiser_datadir_file
    inputBinding:
        prefix: --datadir_file
    type:
    - 'null'
    - File
    doc: TAR GZ with referenece files for EXOMISER
    sbg:suggestedValue: { class: File, path: 69a1b6ed55b9050ca7142b70, name: exomiser_2406_remm_cadd_datadir.tgz }
-   id: exomiser_datadir_name
    doc: Name of data directory after decompression of tar ball
    inputBinding:
        prefix: --datadir_name
    type:
    - 'null'
    - string
-   id: exomiser_local_frequency
    inputBinding:
        prefix: --local_frequency
    type:
    - 'null'
    - File
    doc: Optional. Custom frequency source file for Exomiser. If provided, this will be used instead of the default frequency sources.
-   id: exomiser_local_frequency_index
    inputBinding:
        prefix: --local_frequency_index
    type:
    - 'null'
    - File
-   id: exomiser_pheno_file
    inputBinding:
        prefix: --pheno_file
    type:
    - 'null'
    - File
    doc: YAML file with sample information. This is used to provide phenotypic information to Exomiser. See the documentation for more details on the format.
-   id: exomiser_exomiser_mem
    inputBinding:
        prefix: --exomiser_mem
    type:
    - 'null'
    - int
    doc: Memory to allocate for Exomiser in GB. Default is `16`. You can specify up to `32` GB if needed.
-   id: exomiser_cadd_indelname
    inputBinding:
        prefix: --cadd_indelname
    type:
    - 'null'
    - string
    doc: Name of the CADD indel file. Default is `gnomad.genomes.r4.0.indel.tsv.gz`. If you have a different file, you can specify it here.
-   id: exomiser_cadd_snvname
    inputBinding:
        prefix: --cadd_snvname
    type:
    - 'null'
    - string
    doc: Name of the CADD SNV file. Default is `whole_genome_SNVs.tsv.gz`. If you have a different file, you can specify it here.
-   id: exomiser_cadd_version
    inputBinding:
        prefix: --cadd_version
    type:
    - 'null'
    - float
    doc: CADD version to use for annotation. Default is `1.7`. If you have a different version, you can specify it here.
-   id: exomiser_exomiser_version
    inputBinding:
        prefix: --exomiser_version
    type:
    - 'null'
    - int
    doc: Exomiser version to use for annotation. Default is `2406`. If you have a different version, you can specify it here.
-   id: exomiser_exomiser_genome
    inputBinding:
        prefix: --exomiser_genome
    type:
    - 'null'
    - string
    doc: Genome to use for Exomiser annotation. Default is `hg38`. If you have a different genome, you can specify it here.
-   id: exomiser_remm_filename
    inputBinding:
        prefix: --remm_filename
    type:
    - 'null'
    - string
    doc: Name of the ReMM file to use for Exomiser annotation. Default is `ReMM.v0.4.hg38.tsv.gz`. If you have a different file, you can specify it here.
-   id: exomiser_remm_version
    inputBinding:
        prefix: --remm_version
    type:
    - 'null'
    - string
    doc: Version of the ReMM file to use for Exomiser annotation. Default is `v0.4`. If you have a different version, you can specify it here.
-   doc: FASTA reference for input VCF.
    id: fasta
    inputBinding:
        prefix: --fasta
    label: fasta
    sbg:pattern: ^\S+\.fn?a(sta)?(\.gz)?$
    type:
    - File
    sbg:suggestedValue: { class: File, path: 60639014357c3a53540ca7a3, name: Homo_sapiens_assembly38.fasta }

outputs:
-   id: ANNOTATED_VCF
    label: ANNOTATED_VCF
    outputBinding:
        glob: 'results/ANNOTATED_VCF/*vcf.gz*'
    type:
    - File

-   id: EXOMISER
    label: EXOMISER
    outputBinding:
        glob: 'results/EXOMISER/*exomiser*'
    type:
    - File?
-   id: SLIVAR
    label: SLIVAR
    outputBinding:
        glob: 'results/SLIVAR/*vcf.gz*'
    type:
    - File?

$namespaces:
  sbg: https://sevenbridges.com
"sbg:license": Apache License 2.0
"sbg:publisher": KFDRC
"sbg:categories":
- VEP
- EXOMISER
"sbg:links":
- id: 'https://github.com/d3b-center/D3b-RADIANT-Annotation/releases/tag/v1.0.0'
  label: github-release
