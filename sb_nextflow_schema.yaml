app_content:
    entrypoint: main.nf
class: nextflow
executor_version: 23.04.1
cwlVersion: None
label: D3b RADIANT Annotation vep_v105
id: d3b-radiant-annotation
requirements:
-   class: InlineJavascriptRequirement
-   class: ShellCommandRequirement
-   class: InitialWorkDirRequirement
    listing:
    - entryname: input_params.json
      entry: |
          $(JSON.stringify(
          {
          multiallelics: inputs.multiallelics ? inputs.multiallelics : "-any",
          bcftools_strip_extra_args: inputs.bcftools_strip_extra_args ? inputs.bcftools_strip_extra_args : ""
          }
          ))

doc: |
    # D3b RADIANT Annotation

    <p align="center">
    <img src="docs/logo/d3b-inline-white.svg" alt="D3b repository logo" width="660px" />
    </p>
    <p align="center">
    <a href="https://github.com/d3b-center/D3b-RADIANT-Annotation/blob/master/LICENSE"><img src="https://img.shields.io/github/license/d3b-center/D3b-RADIANT-Annotation.svg?style=for-the-badge"></a>
    </p>

    Simple workflow to reannotate Kids First VEPs to be compatible with the RADIANT framework.
    However, this can also be used to annotate/reannotate any other VCF as needed to ensure the following requirements are met:
    - Old annotations are stripped
    - VCF is normalized
    - VCF is annotated with VEP
    - Exomiser is run
    ## Tools Run
    - `bcftools strip`: Uses `annotate` to remove existing VEP (`CSQ`) and gnomad 3.1.1 (`gnomad_3_1_1*`) annotations
    - `bcftools norm`: Uses `norm` to split (or join) mulit-allelics and normalize indels
    - `VEP`: Uses cache 105 and meets the following specific criteria:
        ```
        --canonical
        --format vcf 
        --hgvs 
        --hgvsg 
        --no_stats 
        --numbers 
        --offline 
        --fields Allele,Consequence,IMPACT,SYMBOL,Feature_type,Gene,PICK,Feature,EXON,BIOTYPE,INTRON,HGVSc,HGVSp,STRAND,CDS_position,cDNA_position,Protein_position,Amino_acids,Codons,VARIANT_CLASS,HGVSg,CANONICAL,RefSeq,MANE,MANE_SELECT,MANE_PLUS 
        --flag_pick 
        --mane 
        --mane_select 
        --pick_order rank,biotype,mane_select,mane_plus_clinical,canonical,appris,tsl,ccds,length,ensembl,refseq 
        --symbol 
        --variant_class 
        --vcf 
        --xref_refseq 
        --compress_output bgzip
        --fasta Homo_sapiens_assembly38.fasta
        --assembly GRCh38
        --species homo_sapiens
        --cache
        --cache_version 105
        ```
    - `exomiser`: "The Exomiser is a Java program that finds potential disease-causing variants from whole-exome or whole-genome sequencing data." See https://github.com/exomiser/Exomiser for more details

    ## Inputs
    What is "required" or not depends upon the input. The **Required** inputs are based on Kids First Processed VCFs. You may use the disable_(insert_step) flags to skip any step not needed based on the input.
    ### Required - Need to provide
    - `vcf`: KF VCF to process
    - `vcf_index` = Index of `vcf`
    - `output_basename`: String prefix of file outputs. Technically optional, but strongly recommended. Default is `TEST`
    #### VEP
    - `vep_cache`: VEP cache for annotation. Recommend 105, `homo_sapiens_vep_105_GRCh38.tar.gz` 
    - `fasta`: FASTA used during variant calling. Recommend `Homo_sapiens_assembly38.fasta`
    #### EXOMISER
    - `analysis_file`: YAML with analysis options. See https://exomiser.readthedocs.io/en/latest/advanced_analysis.html#analysis. Recommend `default_exomiser_WGS_analysis.yml`
    - `datadir_file`: TAR GZ with referenece files. Example contents:
        ```
        data/
        data/remm/
        data/remm/ReMM.v0.4.hg38.tsv.gz.tbi
        data/remm/ReMM.v0.4.hg38.tsv.gz
        data/2406_hg38.sha256
        data/2406_hg38/
        data/2406_hg38/2406_hg38_transcripts_refseq.ser
        data/2406_hg38/2406_hg38_transcripts_ensembl.ser
        data/2406_hg38/2406_hg38_genome.mv.db
        data/2406_hg38/2406_hg38_variants.mv.db
        data/2406_hg38/2406_hg38_transcripts_ucsc.ser
        data/2406_hg38/2406_hg38_clinvar.mv.db
        data/cadd/
        data/cadd/1.7/
        data/cadd/1.7/whole_genome_SNVs.tsv.gz
        data/cadd/1.7/whole_genome_SNVs.tsv.gz.tbi
        data/cadd/1.7/gnomad.genomes.r4.0.indel.tsv.gz
        data/cadd/1.7/gnomad.genomes.r4.0.indel.tsv.gz.tbi
        data/2406_phenotype/
        data/2406_phenotype/2406_phenotype.mv.db
        data/2406_phenotype/rw_string_10.mv
        data/2406_phenotype/phenix/
        data/2406_phenotype/phenix/out/
        data/2406_phenotype/phenix/out/10.out
        data/2406_phenotype/phenix/out/9_symmetric.out
        data/2406_phenotype/phenix/out/14.out
        data/2406_phenotype/phenix/out/13_symmetric.out
        data/2406_phenotype/phenix/out/20.out
        data/2406_phenotype/phenix/out/19.out
        data/2406_phenotype/phenix/out/16_symmetric.out
        data/2406_phenotype/phenix/out/7.out
        data/2406_phenotype/phenix/out/3_symmetric.out
        data/2406_phenotype/phenix/out/8.out
        data/2406_phenotype/phenix/out/17_symmetric.out
        data/2406_phenotype/phenix/out/15_symmetric.out
        data/2406_phenotype/phenix/out/5_symmetric.out
        data/2406_phenotype/phenix/out/11.out
        data/2406_phenotype/phenix/out/14_symmetric.out
        data/2406_phenotype/phenix/out/8_symmetric.out
        data/2406_phenotype/phenix/out/10_symmetric.out
        data/2406_phenotype/phenix/out/1.out
        data/2406_phenotype/phenix/out/20_symmetric.out
        data/2406_phenotype/phenix/out/11_symmetric.out
        data/2406_phenotype/phenix/out/18_symmetric.out
        data/2406_phenotype/phenix/out/4.out
        data/2406_phenotype/phenix/out/19_symmetric.out
        data/2406_phenotype/phenix/out/2.out
        data/2406_phenotype/phenix/out/12.out
        data/2406_phenotype/phenix/out/15.out
        data/2406_phenotype/phenix/out/2_symmetric.out
        data/2406_phenotype/phenix/out/9.out
        data/2406_phenotype/phenix/out/17.out
        data/2406_phenotype/phenix/out/16.out
        data/2406_phenotype/phenix/out/6_symmetric.out
        data/2406_phenotype/phenix/out/13.out
        data/2406_phenotype/phenix/out/18.out
        data/2406_phenotype/phenix/out/3.out
        data/2406_phenotype/phenix/out/4_symmetric.out
        data/2406_phenotype/phenix/out/1_symmetric.out
        data/2406_phenotype/phenix/out/7_symmetric.out
        data/2406_phenotype/phenix/out/6.out
        data/2406_phenotype/phenix/out/5.out
        data/2406_phenotype/phenix/out/12_symmetric.out
        data/2406_phenotype/phenix/hp.obo
        data/2406_phenotype/phenix/ALL_SOURCES_ALL_FREQUENCIES_genes_to_phenotype.txt
        data/2406_phenotype/hp.obo
        ```
    - `pheno_file`: YAML file with sample information
        - Individual example:
        ```yaml
            ---
            id: FM_ZCF17CPC
            proband:
            subject:
                id: BS_4JPDCXVR
                sex: MALE
            phenotypicFeatures:
                - type:
                    id: HP:0009733
                    label: Glioma
            pedigree:
            persons:
                - individualId: BS_4JPDCXVR
                sex: MALE
                affectedStatus: AFFECTED

            metaData:
            resources:
                - id: hp
                name: human phenotype ontology
                url: http://purl.obolibrary.org/obo/hp.owl
                version: hp/releases/2019-11-08
                namespacePrefix: HP
                iriPrefix: 'http://purl.obolibrary.org/obo/HP_'
            phenopacketSchemaVersion: 2.0
        ```
        - Family example:
        ```yaml
            ---
            id: FM_ASMHHE2N
            proband:
            subject:
                id: BS_KPAR4N94
                sex: MALE
            phenotypicFeatures:
                - type:
                    id: HP:0009733
            pedigree:
            persons:
                - individualId: BS_KPAR4N94
                sex: MALE
                paternalId: BS_264QQD38
                maternalId: BS_EQ98CJJT
                affectedStatus: AFFECTED
                - individualId: BS_264QQD38
                sex: MALE
                affectedStatus: UNAFFECTED
                - individualId: BS_EQ98CJJT
                sex: FEMALE
                affectedStatus: UNAFFECTED
            metaData:
            resources:
                - id: hp
                name: human phenotype ontology
                url: http://purl.obolibrary.org/obo/hp.owl
                version: hp/releases/2019-11-08
                namespacePrefix: HP
                iriPrefix: 'http://purl.obolibrary.org/obo/HP_'
            phenopacketSchemaVersion: 2.0

        ```

    ### Required - Has defaults
    #### BCFTOOLS
    - `rm_fields_csv`: List of existing annotation to remove. Default:
        ```
        INFO/CSQ,INFO/gnomad_3_1_1_AC,INFO/gnomad_3_1_1_AN,INFO/gnomad_3_1_1_AF,INFO/gnomad_3_1_1_nhomalt,INFO/gnomad_3_1_1_AC_popmax,INFO/gnomad_3_1_1_AN_popmax,INFO/gnomad_3_1_1_AF_popmax,INFO/gnomad_3_1_1_nhomalt_popmax,INFO/gnomad_3_1_1_AC_controls_and_biobanks,INFO/gnomad_3_1_1_AN_controls_and_biobanks,INFO/gnomad_3_1_1_AF_controls_and_biobanks,INFO/gnomad_3_1_1_AF_non_cancer,INFO/gnomad_3_1_1_primate_ai_score,INFO/gnomad_3_1_1_splice_ai_consequence,INFO/gnomad_3_1_1_FILTER,INFO/gnomad_3_1_1_AF_non_cancer_afr,INFO/gnomad_3_1_1_AF_non_cancer_ami,INFO/gnomad_3_1_1_AF_non_cancer_asj,INFO/gnomad_3_1_1_AF_non_cancer_eas,INFO/gnomad_3_1_1_AF_non_cancer_fin,INFO/gnomad_3_1_1_AF_non_cancer_mid,INFO/gnomad_3_1_1_AF_non_cancer_nfe,INFO/gnomad_3_1_1_AF_non_cancer_oth,INFO/gnomad_3_1_1_AF_non_cancer_raw,INFO/gnomad_3_1_1_AF_non_cancer_sas,INFO/gnomad_3_1_1_AF_non_cancer_amr,INFO/gnomad_3_1_1_AF_non_cancer_popmax,INFO/gnomad_3_1_1_AF_non_cancer_all_popmax
        ```
    #### VEP
    - `assembly`: `GRCh38`
    - `vep_cache_version`: `105`
    - `vep_species`: `homo_sapiens`
    - `vep_cpus`: `32`
    #### EXOMISER
    - `datadir_name`: `data`
    - `cadd_indelname`: `gnomad.genomes.r4.0.indel.tsv.gz`
    - `cadd_snvname`: `whole_genome_SNVs.tsv.gz`
    - `cadd_version`: `1.7`
    - `exomiser_version`: `2406`
    - `exomiser_genome`: `hg38`
    - `exomiser_mem`: `16`
    - `remm_filename`: `ReMM.v0.4.hg38.tsv.gz`
    - `remm_version`: `v0.4`

    ### Optional
    #### BCFTOOLS STRIP
    - `annotate_vcf`: VCF to use to add annotations using bcftools
    - `annotate_vcf_index`: Index of `annotate_vcf`
    - `annot_fields_csv`: CSV list of fields to use from `annotate_vcf` and/or list of fields to rename
    - `bcftools_strip_extra_args`: Extra args to add to the step. Consult tool manual if needed
    #### BCFTOOLS NORM
    - `check_ref`: For BCFTOOLS norm. Check REF alleles and exit (e), warn (w), exclude (x), or set (s) bad sites. Default is `w`
    - `multiallelics`: Split multiallelics (-) or join biallelics (+), type: snps|indels|both|any. Default is `-any`
    #### VEP
    -  `vep_buffer_size`: `100000`
    #### EXOMISER
    - `local_frequency`: custom frequency source file
    - `local_frequency_index`: Index of `local_frequency`


hints:
-   class: sbg:NextflowExecutionMode
    value: multi-instance
-   class: "sbg:maxNumberOfParallelInstances"
    value: 3
arguments:
-   position: 0
    shellQuote: false
    valueFrom: >
        -params-file input_params.json --sbg_run True --outdir ./results --max_cpus 36 --max_memory 128.GB --max_time 12.h
inputs:
-   id: disable_bcftools_strip
    inputBinding:
        prefix: --disable_bcftools_strip
    type:
    - 'null'
    - boolean
    default: false
    doc: "Set to true to skip BCFTOOLS strip step and keep all existing annotations in VCF"
-   id: disable_bcftools_norm
    inputBinding:
        prefix: --disable_bcftools_norm
    type:
    - 'null'
    - boolean
    doc: "Set to true to skip BCFTOOLS norm step if normalization has already ben performed or is not needed. DEFAULT IS TRUE for KF VCFs"
    default: true
-   id: disable_vep
    inputBinding:
        prefix: --disable_vep
    type:
    - 'null'
    - boolean
    default: false
    doc: "Set to true to skip VEP step if VEP annotation has already been performed or is not needed"
-   id: disable_exomiser
    inputBinding:
        prefix: --disable_exomiser
    type:
    - 'null'
    - boolean
    default: false
    doc: "Set to true to skip EXOMISER step if EXOMISER annotation has already been performed or is not needed"
-   id: rm_fields_csv
    inputBinding:
        prefix: --rm_fields_csv
    default: INFO/CSQ,INFO/gnomad_3_1_1_AC,INFO/gnomad_3_1_1_AN,INFO/gnomad_3_1_1_AF,INFO/gnomad_3_1_1_nhomalt,INFO/gnomad_3_1_1_AC_popmax,INFO/gnomad_3_1_1_AN_popmax,INFO/gnomad_3_1_1_AF_popmax,INFO/gnomad_3_1_1_nhomalt_popmax,INFO/gnomad_3_1_1_AC_controls_and_biobanks,INFO/gnomad_3_1_1_AN_controls_and_biobanks,INFO/gnomad_3_1_1_AF_controls_and_biobanks,INFO/gnomad_3_1_1_AF_non_cancer,INFO/gnomad_3_1_1_primate_ai_score,INFO/gnomad_3_1_1_splice_ai_consequence,INFO/gnomad_3_1_1_FILTER,INFO/gnomad_3_1_1_AF_non_cancer_afr,INFO/gnomad_3_1_1_AF_non_cancer_ami,INFO/gnomad_3_1_1_AF_non_cancer_asj,INFO/gnomad_3_1_1_AF_non_cancer_eas,INFO/gnomad_3_1_1_AF_non_cancer_fin,INFO/gnomad_3_1_1_AF_non_cancer_mid,INFO/gnomad_3_1_1_AF_non_cancer_nfe,INFO/gnomad_3_1_1_AF_non_cancer_oth,INFO/gnomad_3_1_1_AF_non_cancer_raw,INFO/gnomad_3_1_1_AF_non_cancer_sas,INFO/gnomad_3_1_1_AF_non_cancer_amr,INFO/gnomad_3_1_1_AF_non_cancer_popmax,INFO/gnomad_3_1_1_AF_non_cancer_all_popmax
    type:
    - 'null'
    - string
    doc: |
        Comma-separated list of fields to remove from the VCF. Default is to remove all existing VEP and gnomad 3.1.1 annotations.
        If you want to keep all existing annotations, set `--disable_bcftools_strip` to true.
-   id: bcftools_strip_extra_args
    type: 'string[]?'
    doc: Extra arguments to pass to bcftools strip command
-   id: vcf
    inputBinding:
        prefix: --vcf
    type:
    - File
    doc: Input VCF file to process
-   id: vcf_index
    inputBinding:
        prefix: --vcf_index
    type:
    - File
    doc: Index of the input VCF file.
-   id: annotate_vcf
    inputBinding:
        prefix: --annotate_vcf
    type:
    - 'null'
    - File
    doc: Optional. VCF file to use to add annotations using bcftools. If provided, the VCF will be annotated with the fields specified in `--annot_fields_csv`. If not provided, no additional annotations will be added.
-   id: annotate_vcf_index
    inputBinding:
        prefix: --annotate_vcf_index
    type:
    - 'null'
    - File
-   id: annot_fields_csv
    inputBinding:
        prefix: --annot_fields_csv
    type:
    - 'null'
    - string
    doc: Optional. Comma-separated list of fields to use from `annotate_vcf` and/or list of fields to rename.
-   id: output_basename
    inputBinding:
        prefix: --output_basename
    default: TEST
    type:
    - 'null'
    - string
    doc: String prefix of file outputs. Technically optional, but strongly recommended. Default is `TEST`
-   id: check_ref
    inputBinding:
        prefix: --check_ref
    default: w
    type:
    - 'null'
    - name: check_ref
      type: enum
      symbols:
       - e
       - w
       - x
       - s
    doc: For BCFTOOLS norm. Check REF alleles and exit (e), warn (w), exclude (x), or set (s) bad sites
-   id: multiallelics
    type:
    - 'null'
    - string
    doc: "Split multiallelics (-) or join biallelics (+), type: snps|indels|both|any"
-   id: vep_cache
    inputBinding:
        prefix: --vep_cache
    type:
    - File
    doc: VEP cache. Current standard is homo_sapiens_vep_105_GRCh38.tar.gz
    sbg:suggestedValue: { class: File, path: 69a1b6ed55b9050ca7142b6f, name: homo_sapiens_vep_105_GRCh38.tar.gz }
-   id: assembly
    inputBinding:
        prefix: --assembly
    default: GRCh38
    type:
    - 'null'
    - string
    doc: Assembly to use for VEP annotation. Default is `GRCh38`. If you have a different assembly, you can specify it here.
-   id: vep_cache_version
    inputBinding:
        prefix: --vep_cache_version
    default: 105
    type:
    - 'null'
    - int
    doc: VEP cache version to use for annotation. Default is `105`. If you have a different cache version, you can specify it here.
-   id: exomiser_mem
    inputBinding:
        prefix: --exomiser_mem
    default: 16
    type:
    - 'null'
    - int
    doc: Memory to allocate for Exomiser in GB. Default is `16`. You can specify up to `32` GB if needed.
-   id: vep_cpu
    inputBinding:
        prefix: --vep_cpu
    default: 32
    type:
    - 'null'
    - int
    doc: Number of CPUs to allocate for VEP. Default is `32`. This is the max for this implementation, but you can specify fewer if needed.
-   id: vep_species
    inputBinding:
        prefix: --vep_species
    default: homo_sapiens
    type:
    - 'null'
    - string
    doc: Species value for VEP
-   id: vep_buffer_size
    inputBinding:
        prefix: --vep_buffer_size
    default: 100000
    type:
    - 'null'
    - int
    doc: VEP buffer size. Adjust for memory usage as needed
-   id: analysis_file
    inputBinding:
        prefix: --analysis_file
    type:
    - 'null'
    - File
    doc: YAML with analysis options. See https://exomiser.readthedocs.io/en/latest/advanced_analysis.html#analysis. Recommend `default_exomiser_WGS_analysis.yml`
    sbg:suggestedValue: { class: File, path: 69a1b6ed55b9050ca7142b6e, name: default_exomiser_WGS_analysis.yml }
-   id: datadir_file
    inputBinding:
        prefix: --datadir_file
    type:
    - 'null'
    - File
    doc: TAR GZ with referenece files for EXOMISER
    sbg:suggestedValue: { class: File, path: 69a1b6ed55b9050ca7142b70, name: exomiser_2406_remm_cadd_datadir.tgz }
-   id: datadir_name
    doc: Name of data directory after decompression of tar ball
    inputBinding:
        prefix: --datadir_name
    default: data
    type:
    - 'null'
    - string
-   id: local_frequency
    inputBinding:
        prefix: --local_frequency
    type:
    - 'null'
    - File
    doc: Optional. Custom frequency source file for Exomiser. If provided, this will be used instead of the default frequency sources.
-   id: local_frequency_index
    inputBinding:
        prefix: --local_frequency_index
    type:
    - 'null'
    - File
-   id: pheno_file
    inputBinding:
        prefix: --pheno_file
    type:
    - 'null'
    - File
    doc: YAML file with sample information. This is used to provide phenotypic information to Exomiser. See the documentation for more details on the format.
-   id: cadd_indelname
    inputBinding:
        prefix: --cadd_indelname
    default: gnomad.genomes.r4.0.indel.tsv.gz
    type:
    - 'null'
    - string
    doc: Name of the CADD indel file. Default is `gnomad.genomes.r4.0.indel.tsv.gz`. If you have a different file, you can specify it here.
-   id: cadd_snvname
    inputBinding:
        prefix: --cadd_snvname
    default: whole_genome_SNVs.tsv.gz
    type:
    - 'null'
    - string
    doc: Name of the CADD SNV file. Default is `whole_genome_SNVs.tsv.gz`. If you have a different file, you can specify it here.
-   id: cadd_version
    inputBinding:
        prefix: --cadd_version
    default: 1.7
    type:
    - 'null'
    - float
    doc: CADD version to use for annotation. Default is `1.7`. If you have a different version, you can specify it here.
-   id: exomiser_version
    inputBinding:
        prefix: --exomiser_version
    default: 2406
    type:
    - 'null'
    - int
    doc: Exomiser version to use for annotation. Default is `2406`. If you have a different version, you can specify it here.
-   id: exomiser_genome
    inputBinding:
        prefix: --exomiser_genome
    default: hg38
    type:
    - 'null'
    - string
    doc: Genome to use for Exomiser annotation. Default is `hg38`. If you have a different genome, you can specify it here.
-   id: remm_filename
    inputBinding:
        prefix: --remm_filename
    default: ReMM.v0.4.hg38.tsv.gz
    type:
    - 'null'
    - string
    doc: Name of the ReMM file to use for Exomiser annotation. Default is `ReMM.v0.4.hg38.tsv.gz`. If you have a different file, you can specify it here.
-   id: remm_version
    inputBinding:
        prefix: --remm_version
    default: v0.4
    type:
    - 'null'
    - string
    doc: Version of the ReMM file to use for Exomiser annotation. Default is `v0.4`. If you have a different version, you can specify it here.
-   doc: FASTA reference for input VCF.
    format: text/plain
    id: fasta
    inputBinding:
        prefix: --fasta
    label: fasta
    sbg:category: Reference genome options
    sbg:icon: far fa-file-code
    sbg:pattern: ^\S+\.fn?a(sta)?(\.gz)?$
    type:
    - File
    sbg:suggestedValue: { class: File, path: 60639014357c3a53540ca7a3, name: Homo_sapiens_assembly38.fasta }

outputs:
-   id: ENSEMBLVEP_VEP
    label: ENSEMBLVEP_VEP
    outputBinding:
        glob: 'results/ENSEMBLVEP_VEP/*vcf.gz*'
    type:
    - File
-   id: EXOMISER
    label: EXOMISER
    outputBinding:
        glob: 'results/EXOMISER/*exomiser*'
    type:
    - File

$namespaces:
  sbg: https://sevenbridges.com
"sbg:license": Apache License 2.0
"sbg:publisher": KFDRC
"sbg:categories":
- VEP
- EXOMISER
"sbg:links":
- id: 'https://github.com/d3b-center/D3b-RADIANT-Annotation/releases/tag/v1.0.0'
  label: github-release
